name: CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Run linter
        run: npm run lint

      - name: Reference API key secret
        env:
          MY_API_KEY: ${{ secrets.MY_API_KEY }}
        run: node -e "console.log('MY_API_KEY configured:', Boolean(process.env.MY_API_KEY))"
